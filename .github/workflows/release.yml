name: Build & Release APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Increment Patch Version
        run: |
          MAJOR=$(grep 'major=' version.properties | cut -d'=' -f2)
          MINOR=$(grep 'minor=' version.properties | cut -d'=' -f2)
          PATCH=$(grep 'patch=' version.properties | cut -d'=' -f2)
          BUILD=$(grep 'build=' version.properties | cut -d'=' -f2)
          NEW_PATCH=$((PATCH + 1))
          NEW_BUILD=$((BUILD + 1))
          sed -i "s/patch=.*/patch=$NEW_PATCH/" version.properties
          sed -i "s/build=.*/build=$NEW_BUILD/" version.properties
          echo "NEW_VERSION=$MAJOR.$MINOR.$NEW_PATCH" >> $GITHUB_ENV
          echo "VERSION_TAG=v$MAJOR.$MINOR.$NEW_PATCH" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Commit version bump
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add version.properties
          git commit -m "chore: bump version to ${{ env.NEW_VERSION }} [skip ci]"
          git push origin main

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: Release ${{ env.NEW_VERSION }}
          files: app/build/outputs/apk/release/app-release-unsigned.apk # Note: It will be unsigned
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
