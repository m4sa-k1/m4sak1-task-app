name: Build & Release APK

on:
  push:
    branches:
      - feature/onboarding-beta

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Increment Beta Version
        run: |
          BETA_VERSION=$(grep 'beta_version=' version.properties | cut -d'=' -f2)
          BUILD=$(grep 'build=' version.properties | cut -d'=' -f2)
          NEW_BETA_VERSION=$((BETA_VERSION + 1))
          NEW_BUILD=$((BUILD + 1))
          sed -i "s/beta_version=.*/beta_version=$NEW_BETA_VERSION/" version.properties
          sed -i "s/build=.*/build=$NEW_BUILD/" version.properties
          echo "NEW_VERSION=Beta1.$NEW_BETA_VERSION" >> $GITHUB_ENV
          echo "VERSION_TAG=Beta1.$NEW_BETA_VERSION" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > app/release-key.keystore

      - name: Build and Sign APK
        env:
          RELEASE_KEYSTORE_FILE: release-key.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Commit version bump
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add version.properties
          git commit -m "chore: bump beta version to ${{ env.NEW_VERSION }} [skip ci]"
          git push origin feature/onboarding-beta

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: Release ${{ env.NEW_VERSION }}
          files: app/build/outputs/apk/release/m4-task-v*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
